<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8f8fa" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Cotext — Contextual knowledge workspace" />

    <title>Cotext</title>

    <!-- FOUC Prevention: apply theme before first paint -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('cotext-theme')
          var theme =
            stored ||
            (window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark')
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>

    <!-- Google Fonts: Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent FOUC flash while CSS loads -->
    <style>
      html:not([data-theme]) { visibility: hidden; }
    </style>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
